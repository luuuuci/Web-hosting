<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Layout + Carrusel</title>

<style>




/* CONTAINER */
.container-project {
  box-sizing: border-box;
  display: flex;
  gap: 30px;
  max-width: 1100px;
  margin: auto;
  background: #f3f3f3;
  border-radius: 20px;
  padding: 30px;


  
  padding:20px;
  background: #ffffff;
  border-style: solid;
  border-width: 1px;
  border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
 
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .container-project {
    flex-direction: column;
  }
}

/* LEFT */
.left-project {
  flex: 1;
}

.left-project h1 {
  font-size: clamp(22px, 3vw, 32px);
  margin-bottom: 20px;
}

.left-project ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.left-project li {
  font-size: 16px;
  color: #444;
  padding-left: 20px;
  position: relative;
}

/* bullet custom */
.left-project li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 8px;
  width: 6px;
  height: 6px;
  background: #000;
  border-radius: 50%;
}

/* CAROUSEL */
.carousel-project {
  flex: 1.2;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
}

.carousel-track-project {
  display: flex;
  transition: transform 0.5s ease;
}

.slide-project {
  min-width: 100%;
}

.slide-project img {
  width: 100%;
  height: auto;
  display: block;
}

/* ARROWS*/
.arrow-project {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 20px;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  transition: all 0.3s ease;
}

.arrow-project.left-project {
  left: 12px;
}

.arrow-project.right-project {
  right: 12px;
}

/* HOVER */
.carousel-project:hover .arrow-project {
  opacity: 1;
}

/* MEJOR HOVER */
.arrow-project:hover {
  background: rgba(0,0,0,0.85);
  transform: translateY(-50%) scale(1.1);
}

/* MOBILE: flechas siempre visibles */
@media (max-width: 768px) {
  .arrow-project {
    opacity: 1;
  }
}
</style>
</head>

<body>

<div class="container-project">

  <!-- LEFT -->
  <div class="left-project">
    <h2>Identity brand: Oddcomes Studio</h2>
    <ul>
      <li><strong>Date:</strong> Abril 2025</li>
      <li><strong>Tools:</strong> Adobe Illustrator</li>
      <li><strong>Description:</strong> Identity mark for a leading studio...</li>
    </ul>
  </div>

  <!-- RIGHT -->
  <div class="carousel-project" id="carousel-project">
    <div class="carousel-track-project" id="track-project">
      <div class="slide-project"><img src="https://picsum.photos/800/500?1"></div>
      <div class="slide-project"><img src="https://picsum.photos/800/500?2"></div>
      <div class="slide-project"><img src="https://picsum.photos/800/500?3"></div>
    </div>

    <button class="arrow-project left-project" id="prev-project">&#10094;</button>
    <button class="arrow-project right-project" id="next-project">&#10095;</button>
  </div>

</div>

<script>
const track = document.getElementById("track-project");
const slides = document.querySelectorAll(".slide-project");
const nextBtn = document.getElementById("next-project");
const prevBtn = document.getElementById("prev-project");
const carousel = document.getElementById("carousel-project");

let index = 0;
const total = slides.length;

function updateCarousel() {
  track.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide() {
  index = (index + 1) % total;
  updateCarousel();
}

function prevSlide() {
  index = (index - 1 + total) % total;
  updateCarousel();
}

nextBtn.addEventListener("click", nextSlide);
prevBtn.addEventListener("click", prevSlide);

/* AUTOPLAY */
let interval = setInterval(nextSlide, 3000);

/* PAUSE ON HOVER */
carousel.addEventListener("mouseenter", () => clearInterval(interval));
carousel.addEventListener("mouseleave", () => {
  interval = setInterval(nextSlide, 3000);
});

/* SWIPE MOBILE (extra pro) */
let startX = 0;

carousel.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

carousel.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextSlide();
  if (endX - startX > 50) prevSlide();
});
</script>

</body>
</html>
