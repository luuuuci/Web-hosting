const track = document.querySelector(".carousel-track")
const cards = Array.from(document.querySelectorAll(".game-card"))

let current = 0

function updateCarousel(){

  const total = cards.length

  const left = (current - 1 + total) % total
  const center = current
  const right = (current + 1) % total

  cards.forEach(card=>{
    card.classList.remove("left","center","right","hidden")
  })

  cards[left].classList.add("left")
  cards[center].classList.add("center")
  cards[right].classList.add("right")

  cards.forEach((card,i)=>{
    if(i !== left && i !== center && i !== right){
      card.classList.add("hidden")
    }
  })

  updateGameInfo(cards[center].dataset.game)
}

function moveRight(){
  current = (current + 1) % cards.length
  updateCarousel()
}

function moveLeft(){
  current = (current - 1 + cards.length) % cards.length
  updateCarousel()
}

document.querySelector(".right").onclick = moveRight
document.querySelector(".left").onclick = moveLeft

updateCarousel()

function updateGameInfo(id){

const game = games[id]

document.getElementById("game-title").innerText = game.title
document.getElementById("trailer").src = game.video

const tags = document.getElementById("tags")
tags.innerHTML=""

game.tags.forEach(t=>{

  const span = document.createElement("span")

  span.innerText = t.text
  span.style.backgroundColor = t.color

  tags.appendChild(span)

})

const link = document.getElementById("link")
link.innerHTML = ""

game.link.forEach(l => {

  const a = document.createElement("a")

  a.href = l.url
  a.innerText = l.name
  a.target = "_blank"

  link.appendChild(a)

})

const features = document.getElementById("features")
features.innerHTML=""
game.features.forEach(f=>{
  const li=document.createElement("li")
  li.innerText=f
  features.appendChild(li)
})

const contrib = document.getElementById("contributions")
contrib.innerHTML=""
game.contrib.forEach(c=>{
  const li=document.createElement("li")
  li.innerText=c
  contrib.appendChild(li)
})

}
